name: Sync skills to docs-v2

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**/SKILL.md'
  workflow_dispatch:

jobs:
  sync-skills:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout agent-skills
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SYNC_APP_ID }}
          private-key: ${{ secrets.SYNC_APP_PRIVATE_KEY }}
          owner: auth0
          repositories: docs-v2

      - name: Checkout docs-v2
        uses: actions/checkout@v4
        with:
          repository: auth0/docs-v2
          token: ${{ steps.app-token.outputs.token }}
          path: docs-v2

      - name: Sync SKILL.md files
        run: |
          SKILLS_DIR="docs-v2/main/.mintlify/skills"
          rm -rf "$SKILLS_DIR"
          mkdir -p "$SKILLS_DIR"

          for skill_file in plugins/*/skills/*/SKILL.md; do
            skill_name=$(basename "$(dirname "$skill_file")")
            mkdir -p "$SKILLS_DIR/$skill_name"
            cp "$skill_file" "$SKILLS_DIR/$skill_name/SKILL.md"
            echo "Synced: $skill_name"
          done

          echo "--- Synced skills ---"
          ls "$SKILLS_DIR"

      - name: Create PR to docs-v2
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          cd docs-v2

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          SHORT_SHA="${COMMIT_SHA::7}"
          BRANCH="chore/sync-agent-skills-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"

          git add main/.mintlify/skills/
          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi

          git commit -m "chore: sync agent skills from auth0/agent-skills@${SHORT_SHA}"

          git push origin "$BRANCH"

          gh pr create \
            --repo auth0/docs-v2 \
            --title "chore: sync agent skills (${SHORT_SHA})" \
            --body "## Summary

          Automated sync of SKILL.md files from [auth0/agent-skills](https://github.com/auth0/agent-skills).

          These files are served via Mintlify's skills discovery endpoint at \`auth0.com/docs/.well-known/skills/\`.

          **Source commit**: auth0/agent-skills@${COMMIT_SHA}

          ## Changes

          Updated \`.mintlify/skills/\` with the latest SKILL.md files from the agent-skills repo.

          ---
          This PR was auto-generated by the [sync-skills-to-docs](https://github.com/auth0/agent-skills/blob/main/.github/workflows/sync-skills-to-docs.yml) workflow." \
            --head "$BRANCH" \
            --base main
